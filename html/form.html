<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Register Form</h1>
    <p>Please fill out the form below:</p>
    <form action="" method="get">
        <label>Username:
            <input type="text" name="username" placeholder="Enter your username" required>
        </label>
        <br/>
        <br/>
        <label>Password:
            <input type="password" name="password" placeholder="Enter your password" required>
        </label>
        <br/>
        <br/>
        <label>Email:
            <input type="email" name="email" placeholder="Enter your email" required>
        </label> 
        <br/>
        <br/>
        <p>Package:</p>
        <label>
            <input type="radio" name="package" value="Free" checked>
            Free
        </label>
        <label>
            <input type="radio" name="package" value="Premium">
            Premium
        </label>
        <p>Interests:</p>
        <label>
            <input type="checkbox" name="interests" value="Watching movies">
            ดูหนัง
        </label>
        <label>
            <input type="checkbox" name="interests" value="Listening to music">
            ฟังเพลง
        </label>
        <label>
            <input type="checkbox" name="interests" value="Playing games">
            เล่นเกม
        </label>
        <br/>
        <br/>
        <button type="submit">ยืนยันการสมัคร</button>
    </form>
</body>
</html>
