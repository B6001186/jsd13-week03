<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders - D2C Bookstore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">D2C Bookstore</a>
    <div class="navbar-links" id="nav-links"></div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/pages/admin/dashboard.html">Dashboard</a>
      <a href="/pages/admin/orders.html" class="active">Orders</a>
      <a href="/pages/admin/inventory.html">Inventory</a>
      <a href="/pages/admin/shipping.html">Shipping</a>
      <a href="/pages/admin/users.html">Users</a>
      <a href="/pages/admin/payments.html">Payments</a>
      <a href="/pages/admin/profile.html">Profile</a>
    </aside>
    <main class="admin-content">
      <h2 style="margin-bottom:1rem">Manage Orders</h2>
      <div style="margin-bottom:1rem">
        <label>Filter by status: </label>
        <select id="status-filter" onchange="loadOrders()">
          <option value="">All</option>
          <option value="pending_payment">Pending Payment</option>
          <option value="paid">Paid</option>
          <option value="preparing_shipment">Preparing Shipment</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>
      <div id="orders-table"><p>Loading...</p></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!requireAdmin()) throw new Error("Not admin");

    const user = getUser();
    document.getElementById("nav-links").innerHTML = `
      <a href="/">Home</a>
      <span style="color:#9ca3af">${user.name} (Admin)</span>
      <button onclick="logout()">Logout</button>
    `;

    const statuses = {
      pending_payment: { label: "Pending Payment", badge: "badge-pending" },
      paid: { label: "Paid", badge: "badge-paid" },
      preparing_shipment: { label: "Preparing", badge: "badge-preparing" },
      shipped: { label: "Shipped", badge: "badge-shipped" },
      delivered: { label: "Delivered", badge: "badge-delivered" },
    };

    async function loadOrders() {
      const filter = document.getElementById("status-filter").value;
      const query = filter ? `?status=${filter}` : "";
      try {
        const orders = await api(`/admin/orders${query}`);
        const container = document.getElementById("orders-table");

        if (orders.length === 0) {
          container.innerHTML = '<p class="empty-state">No orders found.</p>';
          return;
        }

        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead>
                <tr><th>ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th></tr>
              </thead>
              <tbody>
                ${orders.map(o => {
                  const s = statuses[o.status_id?.status_name] || {};
                  return `
                    <tr>
                      <td style="font-family:monospace;font-size:0.8rem">${o._id.slice(-6)}</td>
                      <td>${o.user_id?.name || "Unknown"}</td>
                      <td>${o.items.map(i => `${i.product_id?.product_name || "?"} x${i.quantity}`).join(", ")}</td>
                      <td style="font-weight:600">฿${o.total_amount.toLocaleString()}</td>
                      <td><span class="badge ${s.badge || ""}">${s.label || o.status_id?.status_name}</span></td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (err) {
        document.getElementById("orders-table").innerHTML = '<p class="empty-state">Failed to load orders.</p>';
      }
    }

    loadOrders();
  </script>
</body>
</html>
