<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History - D2C Bookstore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">D2C Bookstore</a>
    <div class="navbar-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom:1.5rem">Order History</h1>
    <div id="orders-content"><p>Loading...</p></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    function renderNav() {
      const nav = document.getElementById("nav-links");
      const user = getUser();
      if (!user) { window.location.href = "/pages/login.html"; return; }
      nav.innerHTML = `
        <a href="/pages/cart.html" class="cart-badge">Cart <span class="count" id="cart-count" style="display:none">0</span></a>
        <a href="/pages/order-history.html">Orders</a>
        ${user.role === "admin" ? '<a href="/pages/admin/dashboard.html">Admin</a>' : ""}
        <span style="color:#9ca3af">${user.name}</span>
        <button onclick="logout()">Logout</button>
      `;
      updateCartCount();
    }

    function statusBadge(status) {
      const map = {
        pending_payment: "badge-pending",
        paid: "badge-paid",
        preparing_shipment: "badge-preparing",
        shipped: "badge-shipped",
        delivered: "badge-delivered",
      };
      return `<span class="badge ${map[status.status_name] || ""}">${status.description}</span>`;
    }

    async function loadOrders() {
      try {
        const orders = await api("/orders");
        const container = document.getElementById("orders-content");

        if (orders.length === 0) {
          container.innerHTML = '<p class="empty-state">No orders yet.<br><a href="/">Browse books</a></p>';
          return;
        }

        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${orders.map(o => `
                  <tr>
                    <td style="font-family:monospace;font-size:0.8rem">${o._id.slice(-6)}</td>
                    <td>${o.items.map(i => `${i.product_id?.product_name || "Book"} x${i.quantity}`).join(", ")}</td>
                    <td style="font-weight:600">฿${o.total_amount.toLocaleString()}</td>
                    <td>${statusBadge(o.status_id)}</td>
                    <td>${new Date(o.created_at).toLocaleDateString("th-TH")}</td>
                    <td>
                      ${o.tracking_number ? `<a href="/pages/order-tracking.html?id=${o._id}" class="btn btn-sm btn-outline">Track</a>` : ""}
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      } catch (err) {
        document.getElementById("orders-content").innerHTML = '<p class="empty-state">Failed to load orders.</p>';
      }
    }

    renderNav();
    loadOrders();
  </script>
</body>
</html>
