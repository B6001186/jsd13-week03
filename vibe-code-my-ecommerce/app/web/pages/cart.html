<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - D2C Bookstore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">D2C Bookstore</a>
    <div class="navbar-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom:1.5rem">Shopping Cart</h1>
    <div id="cart-content"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    function renderNav() {
      const nav = document.getElementById("nav-links");
      const user = getUser();
      if (user) {
        nav.innerHTML = `
          <a href="/pages/cart.html" class="cart-badge">Cart <span class="count" id="cart-count" style="display:none">0</span></a>
          <a href="/pages/order-history.html">Orders</a>
          ${user.role === "admin" ? '<a href="/pages/admin/dashboard.html">Admin</a>' : ""}
          <span style="color:#9ca3af">${user.name}</span>
          <button onclick="logout()">Logout</button>
        `;
      } else {
        nav.innerHTML = '<a href="/pages/login.html">Login</a>';
      }
      updateCartCount();
    }

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cart-content");

      if (cart.length === 0) {
        container.innerHTML = '<p class="empty-state">Your cart is empty.<br><a href="/">Browse books</a></p>';
        return;
      }

      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      container.innerHTML = `
        ${cart.map((item, i) => `
          <div class="cart-item">
            <img src="${item.pics_urls?.[0] || '/assets/images/placeholder.svg'}" alt="${item.product_name}"
                 onerror="this.src='/assets/images/placeholder.svg'">
            <div class="cart-item-info">
              <h3>${item.product_name}</h3>
              <p style="color:var(--accent);font-weight:600">฿${item.price.toLocaleString()}</p>
            </div>
            <div class="cart-item-qty">
              <button onclick="updateQty(${i}, -1)">-</button>
              <span>${item.quantity}</span>
              <button onclick="updateQty(${i}, 1)" ${item.inventory && item.quantity >= item.inventory ? "disabled" : ""}>+</button>
            </div>
            <p style="font-size:0.75rem;color:var(--muted)">Stock: ${item.inventory || "?"}</p>
            <p style="font-weight:600;min-width:80px;text-align:right">฿${(item.price * item.quantity).toLocaleString()}</p>
            <button class="btn btn-sm btn-outline" onclick="removeItem(${i})">Remove</button>
          </div>
        `).join("")}
        <div class="cart-total">
          Total: ฿${total.toLocaleString()} (shipping included)
        </div>
        <div style="text-align:right;margin-top:1rem">
          <a href="/" class="btn btn-outline" style="margin-right:0.5rem">Continue Shopping</a>
          <a href="/pages/checkout.html" class="btn btn-primary">Proceed to Checkout</a>
        </div>
      `;
    }

    function updateQty(index, delta) {
      const cart = getCart();
      const item = cart[index];
      const newQty = item.quantity + delta;

      if (newQty > (item.inventory || 999)) {
        showToast(`Only ${item.inventory || "?"} in stock`);
        return;
      }

      if (newQty <= 0) {
        cart.splice(index, 1);
      } else {
        item.quantity = newQty;
      }
      saveCart(cart);
      renderCart();
    }

    function removeItem(index) {
      const cart = getCart();
      cart.splice(index, 1);
      saveCart(cart);
      renderCart();
    }

    renderNav();
    renderCart();
  </script>
</body>
</html>
