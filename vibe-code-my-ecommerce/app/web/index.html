<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2C Bookstore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">D2C Bookstore</a>
    <div class="navbar-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom:1.5rem">All Books</h1>
    <div class="product-grid" id="product-grid">
      <p>Loading...</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    function renderNav() {
      const nav = document.getElementById("nav-links");
      const user = getUser();
      if (user) {
        nav.innerHTML = `
          <a href="/pages/cart.html" class="cart-badge">Cart <span class="count" id="cart-count" style="display:none">0</span></a>
          <a href="/pages/order-history.html">Orders</a>
          ${user.role === "admin" ? '<a href="/pages/admin/dashboard.html">Admin</a>' : ""}
          <span style="color:#9ca3af">${user.name}</span>
          <button onclick="logout()">Logout</button>
        `;
      } else {
        nav.innerHTML = `
          <a href="/pages/login.html">Login</a>
          <a href="/pages/register.html" class="btn btn-primary" style="padding:0.4rem 1rem">Register</a>
        `;
      }
      updateCartCount();
    }

    async function loadProducts() {
      try {
        const products = await api("/products");
        const grid = document.getElementById("product-grid");
        if (products.length === 0) {
          grid.innerHTML = '<p class="empty-state">No products available yet.</p>';
          return;
        }
        grid.innerHTML = products.map(p => `
          <div class="card">
            <img class="card-img" src="${p.pics_urls[0] || '/assets/images/placeholder.svg'}" alt="${p.product_name}"
                 onerror="this.src='/assets/images/placeholder.svg'">
            <div class="card-body">
              <h3>${p.product_name}</h3>
              <p class="caption">${p.caption}</p>
              <p class="price">฿${p.price.toLocaleString()}</p>
              <p class="stock">${p.inventory > 0 ? `In stock: ${p.inventory}` : "Out of stock"}</p>
              <button class="btn btn-primary btn-block" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")})' ${p.inventory === 0 ? "disabled" : ""}>
                Add to Cart
              </button>
            </div>
          </div>
        `).join("");
      } catch (err) {
        document.getElementById("product-grid").innerHTML = '<p class="empty-state">Failed to load products.</p>';
      }
    }

    renderNav();
    loadProducts();
  </script>
</body>
</html>
